<!DOCTYPE html>
<html>
<head>
  <title>JubJub SDK Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto;
           background: #111; color: white; padding: 0 20px; }
    video { width: 100%; border-radius: 8px; margin: 20px 0; }
    h1, h2 { text-align: center; }
    .note { text-align: center; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <h1>JubJub Pay-Per-View Demo</h1>
  <p class="note">Base Sepolia Testnet</p>

  <h2>Video 1 — Auto-registered</h2>
  <video
    src="https://www.w3schools.com/html/mov_bbb.mp4"
    data-jubjub-creator="creator@example.com"
    data-jubjub-title="Demo Video 1"
    controls>
  </video>

  <h2>Video 2 — Pre-registered</h2>
  <video
    src="https://www.w3schools.com/html/mov_bbb.mp4"
    data-jubjub-content-id="cnt_YOUR_CONTENT_ID"
    controls>
  </video>

  <h2>Video 3 — Free (no JubJub attributes)</h2>
  <video
    src="https://www.w3schools.com/html/mov_bbb.mp4"
    controls>
  </video>

  <!-- JubJub SDK — one script tag, auto-discovers all videos -->
  <script src="../dist/jubjub-sdk.umd.js"></script>
  <script>
    JubJub.init({ platformKey: 'pk_YOUR_KEY' });
  </script>
</body>
</html>
